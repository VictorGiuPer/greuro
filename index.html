<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0B0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="greuro" />
    <title>greuro</title>
    <style>
      /* Instant black splash with a pulsing logo — painted before the app
         bundle loads, so it appears the moment the PWA launches. main.jsx
         fades it out once React has mounted. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0b0f;
        opacity: 1;
        transition: opacity 0.45s ease;
      }
      #splash.splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 96px;
        height: 96px;
        animation: splashPulse 1.6s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.85;
          filter: drop-shadow(0 0 2px rgba(46, 232, 198, 0.25));
        }
        50% {
          transform: scale(1.06);
          opacity: 1;
          filter: drop-shadow(0 0 22px rgba(46, 232, 198, 0.65));
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash img {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash">
      <img src="/logo.png" alt="greuro" />
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
